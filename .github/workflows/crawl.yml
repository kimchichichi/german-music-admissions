name: german-music-crawl            
                             
  on:           
    schedule:
      - cron: "0 0 * * 1"             
    workflow_dispatch:                
      inputs:                         
        force_extract:                
          description: 'Force AI 
  extraction even without page        
  changes'
          required: false
          default: 'false'
          type: boolean
                                      
  jobs:
    crawl:                            
      runs-on: ubuntu-latest
      timeout-minutes: 60

      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            token: ${{
  secrets.GITHUB_TOKEN }}             
   
        - name: Setup Python 3.11     
          uses:   
  actions/setup-python@v5
          with:
            python-version: "3.11"
            cache: "pip"

        - name: Install dependencies  
          run: pip install -r
  requirements.txt                    
                  
        - name: Run crawl pipeline
          env:
            ANTHROPIC_API_KEY: ${{
  secrets.ANTHROPIC_API_KEY }}
            EMAIL_SENDER: ${{
  secrets.EMAIL_SENDER }}             
            EMAIL_PASSWORD: ${{
  secrets.EMAIL_PASSWORD }}           
            EMAIL_RECEIVER: ${{
  secrets.EMAIL_RECEIVER }}
          run: python
  crawl_pipeline.py

        - name: Commit updated files  
          run: |
            git config user.name      
  "github-actions[bot]"
            git config user.email 
  "github-actions[bot]@users.noreply.g
  ithub.com"
            git add universities.json 
  crawl_log.json                      
            git diff --staged --quiet 
  || git commit -m "auto crawl: $(date
   '+%Y-%m-%d')"  
            git push
          continue-on-error: true

        - name: Upload artifacts      
          uses:
  actions/upload-artifact@v4          
          if: always()
          with:
            name: crawl-results-${{
  github.run_number }}
            path: |
              universities.json
              crawl_log.json
            retention-days: 90  
            
