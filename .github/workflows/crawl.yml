name: 독일음대-입시정보-자동수집
                                      
  on:
    schedule:                         
      - cron: "0 0 * * 1"
    workflow_dispatch:
      inputs:
        force_extract:
          description: '변경 없어도 AI
   추출 강제 실행'                    
          required: false
          default: 'false'            
          type: boolean
        
  jobs:
    crawl:
      runs-on: ubuntu-latest
      timeout-minutes: 60

      steps:                          
        - name: 코드 체크아웃
          uses: actions/checkout@v4   
          with:   
            token: ${{
  secrets.GITHUB_TOKEN }}

        - name: Python 3.11 설정      
          uses:
  actions/setup-python@v5             
          with:   
            python-version: "3.11"
            cache: "pip"

        - name: 의존성 설치
          run: pip install -r
  requirements.txt                    
   
        - name: 크롤링 파이프라인 실행
          env:    
            ANTHROPIC_API_KEY: ${{
  secrets.ANTHROPIC_API_KEY }}
            EMAIL_SENDER: ${{
  secrets.EMAIL_SENDER }}             
            EMAIL_PASSWORD: ${{
  secrets.EMAIL_PASSWORD }}           
            EMAIL_RECEIVER: ${{
  secrets.EMAIL_RECEIVER }}
          run: python
  crawl_pipeline.py

        - name: 업데이트된 파일 커밋  
          run: |
            git config user.name      
  "github-actions[bot]"
            git config user.email 
  "github-actions[bot]@users.noreply.g
  ithub.com"
            git add universities.json 
  crawl_log.json                      
            git diff --staged --quiet 
  || git commit -m "자동 크롤링:      
  $(date '+%Y-%m-%d') 업데이트"
            git push
          continue-on-error: true
                                      
        - name: 결과 아티팩트 저장
          uses:                       
  actions/upload-artifact@v4
          if: always()
          with:
            name: crawl-results-${{
  github.run_number }}                
            path: |
              universities.json       
              crawl_log.json
            retention-days: 90        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: 🔍 크롤링 파이프라인 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:    ${{ secrets.EMAIL_RECEIVER }}
        run: python crawl_pipeline.py

      - name: 💾 업데이트된 universities.json 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add universities.json crawl_log.json
          git diff --staged --quiet || git commit -m "🎵 자동 크롤링: $(date '+%Y-%m-%d') 업데이트"
          git push
        continue-on-error: true

      - name: 📊 결과 아티팩트 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawl-results-${{ github.run_number }}
          path: |
            universities.json
            crawl_log.json
            page_hashes.json
          retention-days: 90

      - name: 💾 해시 캐시 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            page_hashes.json
            crawl_log.json
          key: "crawl-cache-${{ 
  github.run_id }}" 

4. 오른쪽 위 **"Commit changes"** 클릭 → 팝업에서 다시 **"Commit changes"**

### Step 4-2. Actions 쓰기 권한 주기
1. 저장소 → **Settings** 탭
2. 왼쪽 메뉴 → **Actions** → **General**
3. 아래로 스크롤 → **"Workflow permissions"**
4. **"Read and write permissions"** 선택
5. **Save** 클릭

---

## 🔐 PART 5. Secrets 설정 & 첫 실행

### Step 5-1. Gmail 앱 비밀번호 먼저 발급
> ⚠️ 일반 Gmail 비밀번호로는 안 돼요. 앱 전용 비밀번호가 필요해요.

1. **myaccount.google.com** 접속
2. 왼쪽 **"보안"** 클릭
3. **"2단계 인증"** 활성화 (이미 되어있으면 통과)
4. 상단 검색창에 **"앱 비밀번호"** 검색 → 클릭
5. 앱 이름 입력란에 `german-music-bot` 입력 → **"만들기"**
6. 노란 박스에 **16자리 코드** 나옴 → 어딘가에 복사해두기
```
   예: abcd efgh ijkl mnop
   → 저장할 때는 공백 없이: abcdefghijklmnop
```

### Step 5-2. GitHub Secrets 4개 입력
1. 저장소 → **Settings** → 왼쪽 **"Secrets and variables"** → **"Actions"**
2. **"New repository secret"** 클릭 → 아래 4개 반복:

| Name (정확히 이렇게) | Secret (값) |
|---------------------|-------------|
| `ANTHROPIC_API_KEY` | `sk-ant-...` (Anthropic Console에서 발급) |
| `EMAIL_SENDER` | `보내는이메일@gmail.com` |
| `EMAIL_PASSWORD` | 위에서 발급한 16자리 (공백 없이) |
| `EMAIL_RECEIVER` | `받을이메일@gmail.com` |

> **ANTHROPIC_API_KEY 발급:** console.anthropic.com → API Keys → Create Key

### Step 5-3. 첫 수동 실행
1. 저장소 → **Actions** 탭
2. 왼쪽 **"독일음대-입시정보-자동수집"** 클릭
3. 오른쪽 **"Run workflow"** 버튼 클릭
4. **"Run workflow"** 다시 클릭 (팝업)
5. 새로고침하면 주황 점 🟠 → 잠시 후 초록 체크 ✅

### Step 5-4. 결과 확인
- ✅ **Actions 탭:** 초록 체크 = 성공
- ✅ **이메일:** 알림 메일 수신 확인
- ✅ **저장소 메인:** 커밋 내역에 `🎵 자동 크롤링` 생성

