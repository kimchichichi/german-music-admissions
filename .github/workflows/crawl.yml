## 📋 전체 체크리스트
```
PART 1  □ GitHub 저장소 생성
PART 2  □ 컴퓨터에 폴더 만들고 파일 저장
PART 3  □ GitHub에 파일 업로드
        □ docs/ 폴더 업로드
PART 4  □ crawl.yml 파일 생성
        □ Actions 쓰기 권한 설정
PART 5  □ Gmail 앱 비밀번호 발급
        □ Secrets 4개 입력
        □ 첫 수동 실행
        □ 이메일 수신 확인 🎉
